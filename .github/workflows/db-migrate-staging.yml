name: Apply DB migrations (dev-staging)

# Whenever migration files change on the dev-staging branch, push them to the
# dev-staging Supabase project so the database stays in sync with merged code.
# Runs ONLY when something under supabase/ changes, so ordinary code merges
# don't touch the database.
on:
  push:
    branches: [dev-staging]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
  workflow_dispatch: # allow manual runs from the Actions tab

# Never run two migration pushes at once, and never cancel one mid-flight —
# a second push waits for the current migration to finish.
concurrency:
  group: supabase-migrate-staging
  cancel-in-progress: false

jobs:
  migrate:
    name: supabase db push → dev-staging
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}
      # dev-staging Supabase project ref (project "crm-portal")
      SUPABASE_PROJECT_REF: rylspyewlnbijdihurqo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to dev-staging project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push migrations
        # --include-all applies pending migrations even when a newer migration
        # is already on the remote (out-of-order timestamps from parallel branches).
        run: supabase db push --include-all
