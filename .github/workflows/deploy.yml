name: Deploy to Railway

# On every push to main: if migrations changed, apply them to the PRODUCTION
# Supabase project first (behind a manual approval gate), then build and deploy
# the web app to Railway. The web deploy only runs if the migration step
# succeeded or was skipped (no migration changes) — never after a failed/rejected
# migration.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel an in-progress run if a newer commit lands on main.
concurrency:
  group: railway-deploy
  cancel-in-progress: true

jobs:
  # ── Stage 1: detect whether this push changed any DB migrations ─────────────
  changes:
    name: Detect migration changes
    runs-on: ubuntu-latest
    outputs:
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter migration paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            migrations:
              - 'supabase/migrations/**'
              - 'supabase/config.toml'

  # ── Stage 2: apply migrations to PRODUCTION (only if they changed) ──────────
  # Uses the `production` GitHub Environment so a required reviewer must approve
  # before anything touches the prod database. (An admin must add the reviewer
  # under Settings → Environments → production for the gate to actually block.)
  migrate:
    name: Apply DB migrations (production)
    needs: changes
    if: needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.PROD_SUPABASE_DB_PASSWORD }}
      # Production Supabase project ref. NOTE: currently the same project as
      # dev-staging (rylspyewlnbijdihurqo). Change this when prod gets its own
      # project.
      SUPABASE_PROJECT_REF: rylspyewlnbijdihurqo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push migrations
        run: supabase db push

  # ── Stage 3: build & deploy the web app to Railway ─────────────────────────
  # Runs after migrate succeeds OR is skipped (no migration changes), but never
  # if migrate failed or was rejected/cancelled at the approval gate.
  deploy:
    name: Build & deploy @crm/web
    needs: [changes, migrate]
    if: always() && needs.migrate.result != 'failure' && needs.migrate.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Gate: fail fast before deploying if the web app doesn't compile/build.
      - name: Typecheck & build
        run: pnpm turbo run typecheck build --filter=@crm/web

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # Uploads the current commit's code to Railway and builds/deploys it.
      # --ci streams the build logs and exits with the build's status.
      - name: Deploy to Railway
        run: railway up --service crm-portal --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
